<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}} - {{.diagram_name}}</title>
    <style>
        /* Local Inter font (variable, weights 300-700) */
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 100 900;
            font-display: swap;
            src: url('/static/fonts/inter-latin-ext.woff2') format('woff2');
            unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 100 900;
            font-display: swap;
            src: url('/static/fonts/inter-latin.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }
        /* Local JetBrains Mono font (variable, weights 400-600) */
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 100 800;
            font-display: swap;
            src: url('/static/fonts/jetbrains-mono-latin-ext.woff2') format('woff2');
            unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
        }
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 100 800;
            font-display: swap;
            src: url('/static/fonts/jetbrains-mono-latin.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }
        :root {
            /* StackMap-inspired Design Tokens */
            --sm-bg: #0a0a0f;
            --sm-surface: #12121a;
            --sm-surface-raised: #16161f;
            --sm-border: rgba(255, 255, 255, 0.06);
            --sm-border-hover: rgba(255, 255, 255, 0.10);
            --sm-border-subtle: rgba(255, 255, 255, 0.04);
            --sm-primary: #4ADE80;
            --sm-primary-glow: rgba(74, 222, 128, 0.15);
            --sm-secondary: #38BDF8;
            --sm-tertiary: #C084FC;
            --sm-warning: #FB923C;
            --sm-danger: #ef4444;
            --sm-danger-muted: rgba(239, 68, 68, 0.6);
            --sm-text: #f5f5f7;
            --sm-text-muted: rgba(245, 245, 247, 0.6);
            --sm-text-faint: rgba(245, 245, 247, 0.3);
            --sm-terminal-bg: #0d0d14;
            --sm-spacing-unit: 8px;
            --sm-radius-sm: 6px;
            --sm-radius-md: 10px;
            --sm-radius-lg: 16px;
            --sm-transition-fast: 120ms ease-out;
            --sm-transition-normal: 180ms ease-out;
            --sm-shadow-panel: 0 1px 3px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.03);
            --sm-shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04);
            --sm-shadow-overlay: 0 24px 64px rgba(0, 0, 0, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            letter-spacing: -0.01em;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--sm-bg);
            color: var(--sm-text);
            height: 100vh;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Loading State */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sm-bg);
            transition: opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px 48px;
            border-radius: var(--sm-radius-lg);
            border: 1px solid var(--sm-border);
            background: rgba(18, 18, 26, 0.8);
            box-shadow: var(--sm-shadow-overlay);
            backdrop-filter: blur(16px);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--sm-border);
            border-top: 2px solid var(--sm-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-size: 14px;
            font-weight: 400;
            color: var(--sm-text-muted);
            letter-spacing: 0.3px;
            margin-bottom: 16px;
        }

        .loading-progress {
            width: 240px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--sm-border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sm-primary), #10B981);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 11px;
            color: var(--sm-text-muted);
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            height: 60px;
            background: var(--sm-surface);
            border-bottom: 1px solid var(--sm-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            position: relative;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--sm-text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-stats {
            display: flex;
            gap: 24px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--sm-primary);
            line-height: 1;
        }

        .stat-label {
            font-size: 11px;
            color: var(--sm-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Filter Sidebar */
        .filter-sidebar {
            width: 320px;
            background: var(--sm-surface);
            border-right: 1px solid var(--sm-border);
            display: flex;
            flex-direction: column;
            z-index: 50;
            transition: transform var(--sm-transition-normal);
        }

        .filter-sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--sm-border);
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--sm-text);
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--sm-terminal-bg);
            border: 1px solid var(--sm-border);
            border-radius: var(--sm-radius-sm);
            color: var(--sm-text);
            font-size: 13px;
            transition: border-color var(--sm-transition-fast);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--sm-primary);
            box-shadow: 0 0 0 2px var(--sm-primary-glow);
        }

        .search-input::placeholder {
            color: var(--sm-text-faint);
        }

        .filter-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--sm-border-subtle);
        }

        .filter-group {
            margin-bottom: 16px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--sm-text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select, .filter-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--sm-terminal-bg);
            border: 1px solid var(--sm-border);
            border-radius: var(--sm-radius-sm);
            color: var(--sm-text);
            font-size: 13px;
            transition: border-color var(--sm-transition-fast);
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: var(--sm-primary);
            box-shadow: 0 0 0 2px var(--sm-primary-glow);
        }

        /* Searchable Dropdown */
        .searchable-dropdown {
            position: relative;
        }

        .searchable-dropdown-input {
            width: 100%;
            padding: 8px 28px 8px 12px;
            background: var(--sm-terminal-bg);
            border: 1px solid var(--sm-border);
            border-radius: var(--sm-radius-sm);
            color: var(--sm-text);
            font-size: 13px;
            transition: border-color var(--sm-transition-fast);
            box-sizing: border-box;
            cursor: pointer;
        }

        .searchable-dropdown-input:focus {
            outline: none;
            border-color: var(--sm-primary);
            box-shadow: 0 0 0 2px var(--sm-primary-glow);
            cursor: text;
        }

        .searchable-dropdown-arrow {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--sm-text-muted);
            pointer-events: none;
            transition: transform 0.15s ease;
        }

        .searchable-dropdown.open .searchable-dropdown-arrow {
            transform: translateY(-50%) rotate(180deg);
        }

        .searchable-dropdown-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: var(--sm-terminal-bg);
            border: 1px solid var(--sm-primary);
            border-top: none;
            border-radius: 0 0 var(--sm-radius-sm) var(--sm-radius-sm);
            z-index: 100;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .searchable-dropdown.open .searchable-dropdown-list {
            display: block;
        }

        .searchable-dropdown-item {
            padding: 6px 12px;
            font-size: 13px;
            color: var(--sm-text);
            cursor: pointer;
        }

        .searchable-dropdown-item:hover,
        .searchable-dropdown-item.highlighted {
            background: var(--sm-primary);
            color: #fff;
        }

        .searchable-dropdown-item.no-results {
            color: var(--sm-text-muted);
            font-style: italic;
            cursor: default;
        }

        .searchable-dropdown-item.no-results:hover {
            background: transparent;
            color: var(--sm-text-muted);
        }

        /* Resource List */
        .resource-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .resource-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--sm-border-subtle);
            cursor: pointer;
            transition: all var(--sm-transition-fast);
            position: relative;
        }

        .resource-item:hover {
            background: var(--sm-surface-raised);
        }

        .resource-item.selected {
            background: var(--sm-primary-glow);
            border-left: 3px solid var(--sm-primary);
        }

        .resource-name {
            font-weight: 500;
            color: var(--sm-text);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .resource-type {
            font-size: 11px;
            color: var(--sm-text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .resource-tags {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .resource-tag {
            padding: 2px 6px;
            background: var(--sm-terminal-bg);
            border: 1px solid var(--sm-border);
            border-radius: 3px;
            font-size: 10px;
            color: var(--sm-text-faint);
        }

        /* Canvas Container */
        .canvas-container {
            flex: 1;
            position: relative;
            background: var(--sm-bg);
            overflow: hidden;
        }

        .diagram-canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            background: radial-gradient(circle at 20% 80%, rgba(74, 222, 128, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                        var(--sm-bg);
        }

        .diagram-canvas:active {
            cursor: grabbing;
        }

        /* Controls */
        .control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .control-group {
            display: flex;
            gap: 4px;
            background: var(--sm-surface);
            border: 1px solid var(--sm-border);
            border-radius: var(--sm-radius-sm);
            padding: 4px;
            box-shadow: var(--sm-shadow-panel);
            backdrop-filter: blur(8px);
        }

        .control-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--sm-text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all var(--sm-transition-fast);
        }

        .control-btn:hover {
            background: var(--sm-surface-raised);
            color: var(--sm-text);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.active {
            background: var(--sm-primary-glow);
            color: var(--sm-primary);
        }

        /* Toggle Button */
        .sidebar-toggle {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            background: var(--sm-surface);
            border: 1px solid var(--sm-border);
            border-radius: var(--sm-radius-sm);
            color: var(--sm-text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            transition: all var(--sm-transition-fast);
            box-shadow: var(--sm-shadow-panel);
            backdrop-filter: blur(8px);
        }

        .sidebar-toggle:hover {
            background: var(--sm-surface-raised);
            color: var(--sm-text);
        }

        /* Minimap */
        .minimap {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 200px;
            height: 120px;
            background: var(--sm-surface);
            border: 1px solid var(--sm-border);
            border-radius: var(--sm-radius-sm);
            box-shadow: var(--sm-shadow-panel);
            backdrop-filter: blur(8px);
            z-index: 100;
            transition: opacity var(--sm-transition-normal);
        }

        .minimap.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .minimap-canvas {
            width: 100%;
            height: 100%;
            border-radius: inherit;
        }

        /* Presentation Mode */
        .presentation-mode .filter-sidebar,
        .presentation-mode .sidebar-toggle,
        .presentation-mode .control-panel,
        .presentation-mode .minimap {
            opacity: 0;
            pointer-events: none;
        }

        .presentation-mode .header {
            transform: translateY(-100%);
        }

        .presentation-mode .canvas-container {
            height: 100vh;
        }

        /* Resource nodes SVG styles */
        .resource-node {
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        .resource-node:hover circle {
            filter: drop-shadow(0 0 8px currentColor);
        }

        .resource-node.selected {
            stroke: var(--sm-primary);
            stroke-width: 2;
            filter: drop-shadow(0 0 8px var(--sm-primary-glow));
        }

        .resource-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            fill: #f5f5f7;
            text-anchor: middle;
            pointer-events: none;
            font-weight: 500;
        }

        /* Connection lines — styles are inlined by JS for export compatibility.
           These CSS rules serve only as fallbacks for any paths that lack inline attrs. */
        .connection-line {
            stroke: #888;
            stroke-width: 1.4;
            fill: none;
            pointer-events: none;
            opacity: 0.5;
        }

        /* Flow dot pulse animation */
        .flow-dot {
            filter: drop-shadow(0 0 2px currentColor);
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: var(--sm-terminal-bg);
            color: var(--sm-text);
            padding: 8px 12px;
            border-radius: var(--sm-radius-sm);
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            max-width: 240px;
            border: 1px solid var(--sm-border);
            box-shadow: var(--sm-shadow-elevated);
            opacity: 0;
            transition: opacity var(--sm-transition-fast);
        }

        .tooltip.show {
            opacity: 1;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--sm-border);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--sm-border-hover);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .filter-sidebar {
                width: 280px;
                transform: translateX(-100%);
            }
            
            .filter-sidebar.open {
                transform: translateX(0);
            }

            .header-stats {
                gap: 16px;
            }

            .stat-value {
                font-size: 16px;
            }

            .minimap {
                width: 160px;
                height: 96px;
            }
        }

        /* Animation utilities */
        .fade-enter {
            opacity: 0;
        }

        .fade-enter-active {
            transition: opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .fade-enter-to {
            opacity: 1;
        }

        .slide-left-enter {
            transform: translateX(-100%);
        }

        .slide-left-enter-active {
            transition: transform var(--sm-transition-normal);
        }

        .slide-left-enter-to {
            transform: translateX(0);
        }

        /* Resource Details Panel */
        .resource-details-panel {
            position: fixed;
            top: 60px;
            right: -400px;
            width: 380px;
            height: calc(100vh - 60px);
            background: var(--sm-surface);
            border-left: 1px solid var(--sm-border);
            z-index: 200;
            transition: right 0.3s ease;
            overflow-y: auto;
            font-size: 13px;
        }

        .resource-details-panel.visible {
            right: 0;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--sm-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--sm-surface);
            z-index: 1;
        }

        .panel-header h3 {
            margin: 0;
            color: var(--sm-text);
            font-size: 14px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--sm-text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .close-btn:hover {
            background: var(--sm-border);
            color: var(--sm-text);
        }

        .resource-info {
            padding: 16px 20px;
            border-bottom: 1px solid var(--sm-border-subtle);
        }

        .resource-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .resource-icon {
            font-size: 16px;
        }

        .resource-name {
            font-weight: 600;
            color: var(--sm-text);
            font-size: 14px;
        }

        .resource-type, .resource-layer, .resource-state {
            font-size: 11px;
            color: var(--sm-text-muted);
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .dependencies-section, .properties-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--sm-border-subtle);
        }

        .dependencies-section h4, .properties-section h4 {
            margin: 0 0 12px 0;
            color: var(--sm-text);
            font-size: 13px;
            font-weight: 600;
        }

        .dependency-group {
            margin-bottom: 16px;
        }

        .dependency-group h5 {
            margin: 0 0 8px 0;
            color: var(--sm-text-muted);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dependency-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 2px;
        }

        .dependency-item:hover {
            background: var(--sm-border-subtle);
        }

        .dependency-item.upstream {
            border-left: 2px solid #3B82F6;
        }

        .dependency-item.downstream {
            border-left: 2px solid #10B981;
        }

        .dep-icon {
            font-size: 12px;
            width: 16px;
            text-align: center;
        }

        .dep-name {
            flex: 1;
            font-size: 11px;
            font-weight: 500;
            color: var(--sm-text);
        }

        .dep-type {
            font-size: 9px;
            color: var(--sm-text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .property-item {
            display: flex;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .prop-key {
            font-weight: 500;
            color: var(--sm-text-muted);
            min-width: 100px;
            font-family: 'JetBrains Mono', monospace;
        }

        .prop-value {
            color: var(--sm-text);
            font-family: 'JetBrains Mono', monospace;
            word-break: break-word;
        }

        /* Dependency Highlighting */
        .selected-resource circle {
            stroke: var(--sm-primary) !important;
            stroke-width: 3px !important;
            filter: drop-shadow(0 0 12px var(--sm-primary-glow)) !important;
        }

        .upstream-dependency circle {
            stroke: #3B82F6 !important;
            stroke-width: 2px !important;
            stroke-opacity: 0.8 !important;
        }

        .downstream-dependency circle {
            stroke: #3B82F6 !important;
            stroke-width: 2px !important;
            stroke-opacity: 0.8 !important;
        }

        .unrelated-resource {
            opacity: 0.15 !important;
        }

        .highlighted-connection {
            stroke-width: 3px !important;
            stroke-opacity: 1 !important;
            filter: drop-shadow(0 0 4px currentColor) !important;
        }

        .dimmed-connection {
            stroke-opacity: 0.08 !important;
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay">
            <div class="loading-card">
                <div class="spinner"></div>
                <div class="loading-text">Loading Cloud Architecture Visualizer...</div>
                <div class="loading-progress">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div class="progress-text"></div>
                </div>
            </div>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="header-title">
                <span>🏗️</span>
                <span>{{.diagram_name}}</span>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="resource-count">{{.resource_count}}</div>
                    <div class="stat-label">Resources</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="connection-count">{{.connection_count}}</div>
                    <div class="stat-label">Connections</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="visible-count">{{.resource_count}}</div>
                    <div class="stat-label">Visible</div>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <main class="main-layout">
            <!-- Filter Sidebar -->
            <aside id="filter-sidebar" class="filter-sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">Search & Filter</div>
                    <input type="text" class="search-input" id="search-input" placeholder="Search resources...">
                </div>

                <div class="filter-section">
                    <div class="filter-group">
                        <label class="filter-label">Resource Type</label>
                        <div class="searchable-dropdown" id="type-filter-dropdown">
                            <input type="text" class="searchable-dropdown-input" placeholder="All Types" autocomplete="off">
                            <span class="searchable-dropdown-arrow">▼</span>
                            <ul class="searchable-dropdown-list"></ul>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Provider</label>
                        <div class="searchable-dropdown" id="provider-filter-dropdown">
                            <input type="text" class="searchable-dropdown-input" placeholder="All Providers" autocomplete="off">
                            <span class="searchable-dropdown-arrow">▼</span>
                            <ul class="searchable-dropdown-list"></ul>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Region</label>
                        <div class="searchable-dropdown" id="region-filter-dropdown">
                            <input type="text" class="searchable-dropdown-input" placeholder="All Regions" autocomplete="off">
                            <span class="searchable-dropdown-arrow">▼</span>
                            <ul class="searchable-dropdown-list"></ul>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">State</label>
                        <div class="searchable-dropdown" id="state-filter-dropdown">
                            <input type="text" class="searchable-dropdown-input" placeholder="All States" autocomplete="off">
                            <span class="searchable-dropdown-arrow">▼</span>
                            <ul class="searchable-dropdown-list"></ul>
                        </div>
                    </div>
                </div>

                <div class="resource-list" id="resource-list"></div>
            </aside>

            <!-- Canvas Container -->
            <div class="canvas-container">
                <!-- Sidebar Toggle -->
                <button id="sidebar-toggle" class="sidebar-toggle">
                    <span>☰</span>
                </button>

                <!-- Controls -->
                <div class="control-panel">
                    <div class="control-group">
                        <button class="control-btn" id="zoom-in" title="Zoom In">+</button>
                        <button class="control-btn" id="zoom-out" title="Zoom Out">−</button>
                        <button class="control-btn" id="fit-view" title="Fit to View">⌖</button>
                        <button class="control-btn" id="reset-layout" title="Reset Layout">↻</button>
                    </div>
                    <div class="control-group">
                        <button class="control-btn" id="toggle-labels" title="Toggle Labels (L)">Aa</button>
                        <button class="control-btn" id="toggle-minimap" title="Toggle Minimap (M)">🗺</button>
                        <button class="control-btn active" id="toggle-flow" title="Toggle Flow Animations (A)">〰</button>
                        <button class="control-btn" id="presentation-mode" title="Presentation Mode (P)">📺</button>
                    </div>
                    <div class="control-group">
                        <button class="control-btn" id="export-png" title="Export PNG">📷</button>
                        <button class="control-btn" id="export-svg" title="Export SVG">🎨</button>
                    </div>
                </div>

                <!-- Main Canvas -->
                <svg id="diagram-canvas" class="diagram-canvas"></svg>

                <!-- Minimap -->
                <div id="minimap" class="minimap">
                    <svg id="minimap-canvas" class="minimap-canvas"></svg>
                </div>
            </div>
        </main>

        <!-- Tooltip -->
        <div id="tooltip" class="tooltip"></div>
    </div>

    <script src="/static/js/diagram_enhanced.js"></script>
    <script>
        // Create global reference for detail panel onclick handlers
        let diagram;
        document.addEventListener('DOMContentLoaded', () => {
            diagram = new EnhancedDiagramViewer();
        });
    </script>
</body>
</html>
